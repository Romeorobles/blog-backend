<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Align Items Flexbox</title>
    <link rel="stylesheet" href="10_flexbox_align.css">
</head>
<body>

    <h1 style="color: #e63946;">ALINEAR ELEMENTOS DE FLEXBOX</h1>

    <h2>flex-start (inicio)</h2>

    <h2>estirar (predeterminado)</h2>
    <div class="contenedor stretch">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <h2>arranque flexible</h2>
    <div class="contenedor inicio">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <h2>extremo flexible</h2>
    <div class="contenedor fin">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <h2>centro</h2>
    <div class="contenedor centro">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <h2>base</h2>
    <div class="contenedor baseline">
        <div class="item">Texto</div>
        <div class="item">Texto más grande</div>
        <div class="item">Texto</div>
    </div>

</body>
</html>
