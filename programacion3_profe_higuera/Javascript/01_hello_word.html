<!DOCTYPE html>
<html lang="es">
<body>

<!-- El JS vive dentro del atributo onclick -->
<button onclick="alert('Hola, mundo!')">Haz clic pedenjo </button>
<br/>
<h1 id="titulo">Hola</h1>
<br/>
<h1 id="titulo2">Cargando...</h1>

<!-- Mejor ubicar el script al final del body para no bloquear el renderizado -->
<script>
    const titulo = document.getElementById("titulo");
    titulo.textContent = "¡Hola, JavaScript!";
    console.log("Script interno ejecutado");
    console.log("Hello from console");
</script>

<script src="01_hello_world.js" defer></script>

</body>
</html>
