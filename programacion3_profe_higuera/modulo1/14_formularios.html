<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewpoint" content="width-device-width, initial-scale=1.0">
    <title>Enlaces</title>
</head>


<body>
    <h1>Formularios</h1>
    <form action="/procesar" method="post">

        <table>
            <tr>
                <td>
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre">
                </td>
                <td>
                    <label for="Nombre" >Correo electronico
                        <input type="email" id="email" name="email">
                    </label>
                </td>
            </tr>
                <tr>
                    <td>
                        <label for="Password">Contraseña</label><br>
                        <input type="password" id="password" name="password">
                    </td>
                    <td>
                        <label for="url">Sitio web</label><br>
                        <input type="url" id="url" name="url">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="Password">Contraseña</label><br>
                        <input type="tel" id="tel" name="tel">
                    </td>
                    <td>
                        <label for="Password">Sitio web</label><br>
                        <input type="url" id="url" name="url">
                    </td>
                </tr>

                <!-- tipo numericosss -->

                <tr>
                    <td>
                        <label for="edad">Edad</label><br>
                        <input type="number" id="edad" name="edad" min="0" max="120" step="1">
                    </td>
                    <td>
                        <label for="Volumen">Volumen<span id="val-vol">50</span></label><br></label>
                        <input type="range" id="volumen" name="volumen" min="0" max="120" value="50"
                        oninput="document.getElementById('val-vol').textContent=this.value">

                    </td>
                </tr>


                <!-- tipos de fecha -->
                <tr>
                    <td>
                        <label for="fecha">Fecha de nacimiento</label><br>
                        <input type="date" id="fecha" name="fecha">
                    </td>
                    <td>
                        <label for="hora">Hora de la cita</label>
                        <input type="time" id="hora"name=hora
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="evento">Inicio del evento</label><br>
                        <input type="datetime-local" id="evento" name="evento">
                    </td>
                    <td>
                        <label for="mes">Mes de inicio</label>
                        <input type="month" id="mes"name=mes
                    </td>
                </tr>
<!-- Checkbox y Option -->
<tr>
    <td colspan="2">
        <h3>Checkbox y Option</h3>
    </td>
</tr>

<tr>
    <td>
        <input type="checkbox" id="aceptar" name="aceptar" value="si">
        <label for="aceptar">Acepto los términos y condiciones</label><br>
    </td>

    <td>
        <fieldset>
            <legend>Metodo de pago</legend>

            <input type="radio" id="tarjeta" name="pago" value="tarjeta">
            <label for="tarjeta">Tarjeta de crédito</label>

            <input type="radio" id="paypal" name="pago" value="paypal">
            <label for="paypal">PayPal</label>

            <input type="radio" id="tranferencia" name="pago" value="tranferencia">
            <label for="tranferencia">Transferencia bancaria</label>

        </fieldset>




<!-- Utiles -->
<tr>
    <td colspan="2">
        <h3>Utiles</h3>
    </td>
</tr>

<tr>
    <td>
        <label for="color">Color</label><br>
        <input type="color" id="color" name="color" value="#ff0000">
    </td>

    <td>
        <label for="foto">Foto</label><br>
        <input type="file" id="foto" name="foto" accept="image/*">
    </td>
</tr>

<tr>
    <td>
        <label for="docs">Documentos</label><br>
        <input type="file" id="docs" name="documentos" accept=".pdf,.doc,.docx">
    </td>

    <td>
        <input type="hidden" id="token" name="token" value="abcd123xyz">
    </td>
</tr>
<!-- TextArea y Select-->
<tr>
    <td colspan="2">
        <h3>Textarea y Select</h3>
    </td>
</tr>

<tr>
    <td>
        <label for="mensaje">Mensaje</label><br>
        <textarea id="mensaje"
            name="mensaje"
            rows="6"
            cols="50" placeholder="Escribe tu mensaje aquí"></textarea>
    </td>

    <td>
        <!-- select Basico-->
        <label for="pais">País</label><br>
        <select id="pais" name="pais">
            <option value="">Selecciona un país</option>
            <option value="mx">México</option>
            <option value="es">España</option>
            <option value="ar">Argentina</option>
            <option value="co">Colombia</option>
        </select>
    </td>
</tr>
<td>
    <!-- Select con optgroup -->
    <select id="ciudad" name="ciudad">
    <optgroup label="España">
        <option value="mad">Madrid</option>
        <option value="bcn">Barcelona</option>
        <option value="sev">Sevilla</option>
    </optgroup>

    <optgroup label="Mexico">
        <option value="mad">Ciudad de Mexico</option>
        <option value="gdl">Guadalajara</option>
    </optgroup>

    <optgroup label="Venezuela">
        <option value="cor">Coro</option>
        <option value="mar">Maracaibo</option>
    </optgroup>
</select>
</td>
<!-- Selección Múltiple-->
<td>
    <label for="skill">Habilidades:</label><br>
    <select id="skill" name="habilidadedes[]" multiple size="4">
        <option value="html5">HTML5</option>
        <option value="ccs3">CSS3</option>
        <option value="js">Javascript</option>
        <option value="ts">Typescript</option>
    </select>
</td>
</tr>
